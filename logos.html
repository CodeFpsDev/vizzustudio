    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos para la galería de logos */
        .galeria-logos {
            padding: 80px 5%;
            background-color: #121212;
            text-align: center;
        }

        .header-galeria {
            margin-bottom: 50px;
        }

        .header-galeria h1 {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .header-galeria span {
            color: #e63946; /* Rojo Vizzu */
        }

        .grid-logos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .logo-item {
            background-color: #1f1f1f;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-item:hover {
            border-color: #e63946;
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(230, 57, 70, 0.2);
        }

        .logo-item img {
            max-width: 100%;
            height: auto;
            filter: grayscale(100%);
            transition: 0.4s;
        }

        .logo-item:hover img {
            filter: grayscale(0%);
        }

        .logo-nombre {
            margin-top: 20px;
            font-weight: bold;
            color: #fff;
            font-size: 1.1rem;
        }

        .btn-volver {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 30px;
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #e63946;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-volver:hover {
            background-color: #e63946;
        }
    </style>
</head>
